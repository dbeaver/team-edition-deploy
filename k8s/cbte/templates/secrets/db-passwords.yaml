{{- if not .Values.backend.cloudbeaver_db_password }}
  {{- fail "Error: backend.cloudbeaver_db_password is missing or empty" }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-pass
type: Opaque
stringData:
  postgres-pass: {{ .Values.backend.cloudbeaver_db_password }}